# MkDocs Configuration for Gilles Degottex's Academic Website
# Using Material Theme for modern, responsive design

site_name: G. Degottex's Homepage
site_description: Research portfolio of Gilles Degottex - Speech Processing, Voice Synthesis, Audio Signal Processing
site_author: Gilles Degottex
site_url: https://gillesdegottex.eu/

# Copyright
copyright: "© 2024 Gilles Degottex"

# Theme configuration
theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/account
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - header.autohide
    - content.code.annotate
    - content.tooltips
    - search.highlight
    - search.share
    - search.suggest
    - toc.integrate
  toc:
    title: Table of Contents
    intree: true

# Plugins
plugins:
  - search

# Hooks
hooks:
  - hooks/bibtex_inline.py

# Customization
extra:
  social:
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0002-1833-787X
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/citations?user=example
    - icon: fontawesome/brands/github
      link: https://github.com/gillesdegottex
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/gillesdegottex
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/gdegottex
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/gillesdegottex
    - icon: fontawesome/solid/envelope
      link: mailto:gdegottex@gmail.com

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Navigation
nav:
  - Research: research.md
  - Publications: publications.md
  - Tools: tools.md
  - Misc:
      - Author Posting: misc/author-posting.md
      - Listening Tests: misc/listening-tests.md
